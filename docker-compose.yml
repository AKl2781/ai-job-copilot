services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_job_copilot
      POSTGRES_USER: ${POSTGRES_USER:-ai_job_copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-dev-only}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-ai_job_copilot} -d ai_job_copilot
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

volumes:
  postgres_data:
