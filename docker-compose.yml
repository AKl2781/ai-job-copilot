services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ai_job_copilot
      POSTGRES_USER: ${POSTGRES_USER:-ai_job_copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-ai_job_copilot} -d ai_job_copilot
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - path: .env
        required: false
      - path: .env.docker
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ai_job_copilot}:${POSTGRES_PASSWORD:-change-me}@postgres:5432/ai_job_copilot
      DOCUMENT_STORAGE_PATH: /app/data/documents
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

volumes:
  postgres_data:
